server {
	listen 80 default_server;
	listen [::]:80 default_server;
	return 301 https://192.168.138.254;
}

server {

        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;

	ssl_certificate /etc/nginx/conf.d/public.crt;
	ssl_certificate_key /etc/nginx/conf.d/private.key;
	#ssl_session_cache shared:SSL:1m;
	#ssl_session_timeout 10m;
	#ssl_ciphers PROFILE=SYSTEM;
	#ssl_prefer_server_ciphers on;

	location / {
		proxy_pass http://web/;
		#proxy_set_header Host $host;
		#proxy_set_header X-Real-IP $remote_addr; # forward client IP to backend server
		#proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # forward client IP to backend server
		#proxy_set_header X-Forwarded-Proto $scheme;
	}
}



server {
 listen 443;
 ssl_certificate /etc/nginx/conf.d/public.crt;
 ssl_certificate_key /etc/nginx/conf.d/private.key;

 location / {

   root /usr/share/nginx/html;
   index index.html index.htm;
}
}

